# Level: strict
# Full suite — bugs, security, style, complexity, naming, types.
# For repos that want maximum enforcement.

line-length = 120
target-version = "py312"
extend-exclude = ["*.ipynb"]

[lint]
select = [
    "F",   # pyflakes
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "B",   # bugbear
    "S",   # bandit
    "I",   # isort
    "UP",  # pyupgrade
    "C90", # mccabe complexity
    "N",   # pep8-naming
    "Q",   # flake8-quotes
    "ANN", # flake8-annotations
    "TC",  # flake8-type-checking
    "FA",  # flake8-future-annotations
    "PYI", # flake8-pyi
    "D",   # pydocstyle
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "E741",  # ambiguous variable name (false positives on short math/science vars)
    "D100",  # missing docstring in public module
    "D104",  # missing docstring in public package
    "D105",  # missing docstring in magic method
    "D107",  # missing docstring in __init__
    "S106",  # hardcoded-password-func-arg (false positives)
    "S108",  # hardcoded-temp-file
    "S311",  # non-cryptographic random
]

[lint.mccabe]
max-complexity = 15

[lint.pydocstyle]
convention = "google"

[lint.flake8-type-checking]
strict = true
quote-annotations = true
runtime-evaluated-base-classes = [
    "pydantic.BaseModel",
    "pydantic.BaseSettings",
    "pydantic.RootModel",
    "pydantic_settings.BaseSettings",
]
runtime-evaluated-decorators = [
    "pydantic.field_validator",
    "pydantic.model_validator",
    "pydantic.validator",
    "pydantic.root_validator",
]

[lint.per-file-ignores]
"**/tests/**" = ["S101", "D", "ANN", "TC", "F811", "N812", "B017", "B023"]
"**/test_*.py" = ["S101", "D", "ANN", "TC", "F811", "N812", "B017", "B023"]
"**/*_test.py" = ["S101", "D", "ANN", "TC", "F811", "N812", "B017", "B023"]
"**/conftest.py" = ["S101", "D", "ANN", "TC", "F811"]
"**/alembic/versions/*" = ["D", "N999", "UP"]
"benchmarks/**" = ["S101", "D", "ANN", "TC", "S110", "S310", "S608", "B007", "C901", "N", "E741"]
"src/profiling/**" = ["S101", "D", "ANN", "TC", "S110", "N", "C901"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
