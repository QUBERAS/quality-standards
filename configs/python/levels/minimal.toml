# Level: minimal
# Catches only real bugs and syntax errors. Good starting point for legacy repos.

line-length = 120
target-version = "py312"

[lint]
select = [
    "F",   # pyflakes — unused imports, undefined names
    "E",   # pycodestyle — syntax-level errors
]
ignore = [
    "E501", # line too long (handled by formatter)
]

[lint.per-file-ignores]
"**/tests/**" = ["S101"]
"**/test_*.py" = ["S101"]
"**/*_test.py" = ["S101"]
"**/conftest.py" = ["S101"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
