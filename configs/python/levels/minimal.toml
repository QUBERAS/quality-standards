# Level: minimal
# Catches only real bugs and syntax errors. Good starting point for legacy repos.

line-length = 120
target-version = "py312"
extend-exclude = ["*.ipynb"]

[lint]
select = [
    "F",   # pyflakes — unused imports, undefined names
    "E",   # pycodestyle — syntax-level errors
]
ignore = [
    "E501", # line too long (handled by formatter)
    "E741", # ambiguous variable name (false positives on short math/science vars)
]

[lint.per-file-ignores]
"**/tests/**" = ["F811"]
"**/test_*.py" = ["F811"]
"**/*_test.py" = ["F811"]
"**/conftest.py" = ["F811"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
