name: Commitlint

on:
  workflow_call: {}

jobs:
  commitlint:
    name: "Commit messages (commitlint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch commitlint config
        uses: actions/checkout@v4
        with:
          repository: QUBERAS/quality-standards
          path: .quality-standards
          sparse-checkout: configs/common/commitlint.config.js

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install commitlint
        run: npm install --save-dev @commitlint/cli @commitlint/config-conventional

      - name: Lint commits
        run: |
          CONFIG=".quality-standards/configs/common/commitlint.config.js"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx commitlint \
              --config "$CONFIG" \
              --from "${{ github.event.pull_request.base.sha }}" \
              --to "${{ github.event.pull_request.head.sha }}" \
              --verbose
          else
            BEFORE="${{ github.event.before }}"
            # On first push to a branch, before is all zeros — only lint HEAD
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              npx commitlint --config "$CONFIG" --from HEAD~1 --to HEAD --verbose
            else
              npx commitlint --config "$CONFIG" --from "$BEFORE" --to HEAD --verbose
            fi
          fi
