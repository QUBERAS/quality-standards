name: Python Format

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"
      ruff-version:
        description: "Pin ruff version (empty = latest)"
        type: string
        default: ""
      level:
        description: "Enforcement level: minimal, standard, strict (empty = repo config)"
        type: string
        default: "standard"

jobs:
  format:
    name: "Format (ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install ruff
        run: pip install ${{ inputs.ruff-version && format('ruff=={0}', inputs.ruff-version) || 'ruff' }}

      - name: Fetch level config
        if: ${{ inputs.level != '' }}
        uses: actions/checkout@v4
        with:
          repository: QUBERAS/quality-standards
          path: .quality-standards
          sparse-checkout: configs/python/levels/${{ inputs.level }}.toml

      - name: Check formatting (level: ${{ inputs.level }})
        if: ${{ inputs.level != '' }}
        run: ruff format --check --config .quality-standards/configs/python/levels/${{ inputs.level }}.toml .

      - name: Check formatting (repo config)
        if: ${{ inputs.level == '' }}
        run: ruff format --check .
