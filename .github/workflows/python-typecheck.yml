name: Python Typecheck

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"
      typecheck-cmd:
        description: "Command to run (e.g. 'mypy .', 'ty check', 'pyright')"
        type: string
        required: true
      continue-on-error:
        description: "Allow failure (warn only)"
        type: boolean
        default: false

jobs:
  typecheck:
    name: "Type check"
    runs-on: ubuntu-latest
    continue-on-error: ${{ inputs.continue-on-error }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install project dependencies
        run: |
          if uv pip install -e ".[dev]" --system; then
            echo "Installed with [dev] extras"
          elif uv pip install -e . --system; then
            echo "Installed without extras"
          else
            echo "::warning::No installable package found — type checker may report missing imports"
          fi

      - name: Install type checker
        run: uv pip install ty --system

      - name: Type check
        run: ${{ inputs.typecheck-cmd }}
