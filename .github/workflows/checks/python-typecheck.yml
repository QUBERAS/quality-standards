name: Python Typecheck

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"
      typecheck-cmd:
        description: "Command to run (e.g. 'mypy .', 'ty check', 'pyright')"
        type: string
        required: true
      continue-on-error:
        description: "Allow failure (warn only)"
        type: boolean
        default: true

jobs:
  typecheck:
    name: "Type check"
    runs-on: ubuntu-latest
    continue-on-error: ${{ inputs.continue-on-error }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install project dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true

      - name: Type check
        run: ${{ inputs.typecheck-cmd }}
