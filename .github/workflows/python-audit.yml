name: Python Dependency Audit

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"

jobs:
  audit:
    name: "Dependency audit (uv)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Audit
        run: uv audit
