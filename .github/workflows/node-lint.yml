name: Node Lint

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
      continue-on-error:
        description: "Allow failure (warn only)"
        type: boolean
        default: false

jobs:
  lint:
    name: "Lint (eslint)"
    runs-on: ubuntu-latest
    continue-on-error: ${{ inputs.continue-on-error }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .
