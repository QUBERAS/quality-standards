name: Secrets Scan

on:
  workflow_call: {}

jobs:
  secrets:
    name: "Secrets (trufflehog)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@v3.88.1
        with:
          extra_args: --only-verified
